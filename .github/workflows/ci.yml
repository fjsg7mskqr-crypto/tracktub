name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  web:
    name: web (lint · typecheck · build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install
        run: npm ci

      # Advisory for now: high/critical advisories annotate the run instead of
      # failing it. Revisit making this required once there's a week of signal
      # (tracked in #39).
      - name: Audit dependencies (advisory)
        run: |
          npm audit --audit-level=high || echo "::warning title=npm audit::High/critical advisories found — see the step output."

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      # Make a skipped RLS gate VISIBLE: without secrets the RLS isolation suite
      # silently skips, so annotate the run instead of letting green hide it.
      - name: RLS gate status
        env:
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          if [ -z "$SUPABASE_SERVICE_ROLE_KEY" ]; then
            echo "::warning title=RLS gate skipped::Supabase secrets not configured — the RLS isolation suite did NOT run. Add NEXT_PUBLIC_SUPABASE_URL, NEXT_PUBLIC_SUPABASE_ANON_KEY and SUPABASE_SERVICE_ROLE_KEY as repository secrets to enforce it."
          else
            echo "RLS secrets present — the isolation suite will run."
          fi

      # Env unit tests run always; the RLS isolation suite runs only when the
      # Supabase secrets are configured (otherwise it skips, see the step above).
      - name: Test
        run: npm run test
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
