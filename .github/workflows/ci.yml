name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least-privilege token for all jobs (CodeQL actions/missing-workflow-permissions).
permissions:
  contents: read

jobs:
  web:
    name: web (lint · typecheck · build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install
        run: npm ci

      # Advisory for now: high/critical advisories annotate the run instead of
      # failing it. Revisit making this required once there's a week of signal
      # (tracked in #39).
      - name: Audit dependencies (advisory)
        run: |
          npm audit --audit-level=high || echo "::warning title=npm audit::High/critical advisories found — see the step output."

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      # Fast unit suite (security headers, env, url, email, middleware-session).
      # The RLS isolation suite (tests/rls.test.ts) self-skips here — without a
      # service-role key it can't provision users — and runs for real in the
      # dedicated `rls` job below against an ephemeral local Supabase. We do NOT
      # wire the prod service-role key as a repo secret on purpose: that would
      # point the suite's create/teardown at the shared production database.
      - name: Test (unit)
        run: npm run test
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

  # The M1 security gate, for real: boot a throwaway Supabase, apply migrations,
  # and run the RLS isolation suite against it. Isolated from prod and parallel-
  # safe (every run gets its own stack), so there's no shared-database foot-gun.
  rls:
    name: rls (isolation suite · ephemeral supabase)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          # Node 22 (not 20 like the build job): @supabase/realtime-js, pulled in
          # transitively by createClient(), requires a native WebSocket global —
          # stable since Node 22; on Node 20 it throws at client construction.
          node-version: 22
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install
        run: npm ci

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: "2.95.4"

      # Boots the local stack in Docker and applies every migration in
      # supabase/migrations. Seeding is disabled in config.toml (the dev seed
      # has unsubstituted :placeholders); the suite provisions its own data.
      - name: Start local Supabase
        run: supabase start

      # The local stack's anon/service keys are static, non-secret demo JWTs.
      # Feed them to the suite via the same env vars the app reads.
      - name: Export local stack credentials
        run: |
          set -a; eval "$(supabase status -o env)"; set +a
          {
            echo "NEXT_PUBLIC_SUPABASE_URL=$API_URL"
            echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=$ANON_KEY"
            echo "SUPABASE_SERVICE_ROLE_KEY=$SERVICE_ROLE_KEY"
          } >> "$GITHUB_ENV"

      - name: RLS isolation suite
        run: npm run test:rls

      - name: Stop local Supabase
        if: always()
        run: supabase stop --no-backup
