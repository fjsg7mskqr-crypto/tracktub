# Supabase CLI config.
#
# NOTE: the source of truth for this project is the LIVE remote database
# (project ref slkxwpiiludisrnwnxlg), managed via the Supabase MCP — NOT the CLI.
# (The CLI triggers a macOS Keychain prompt on every call.) See ./README.md.
#
# This minimal config exists so the supabase/ directory is well-formed and the
# migrations/ history is linkable should anyone use the CLI later.
project_id = "slkxwpiiludisrnwnxlg"

# Automated `supabase start` (the CI RLS gate) applies the migrations but must
# NOT run seed.sql: the dev seed uses unsubstituted :operator_uid/:staff_uid
# placeholders that aren't valid UUIDs and would abort the start. The RLS
# isolation suite provisions and tears down its own users/orgs.
[db.seed]
enabled = false
